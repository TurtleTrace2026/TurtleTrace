name: Bug 反馈
description: 报告一个 Bug 帮助我们改进产品
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢您花时间填写这份 Bug 报告！请尽量提供详细信息。

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 请清晰简洁地描述这个 Bug
      placeholder: 例如：在添加持仓时，如果股票代码包含字母，保存按钮无响应
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请提供复现该问题的详细步骤
      placeholder: |
        1. 打开「持仓管理」页面
        2. 点击「添加持仓」按钮
        3. 输入股票代码 "600519"
        4. 填写价格和数量
        5. 点击保存
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 您期望发生什么？
      placeholder: 例如：持仓应该成功添加并显示在列表中
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
      placeholder: 例如：点击保存后没有任何反应，控制台显示错误
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如果适用，请添加截图帮助解释问题
      placeholder: 可直接拖拽图片到此处

  - type: textarea
    id: logs
    attributes:
      label: 控制台日志
      description: 请粘贴浏览器控制台的错误信息（如果有）
      placeholder: |
        打开浏览器开发者工具 (F12) -> Console 标签页
        复制红色的错误信息
      render: shell

  - type: dropdown
    id: module
    attributes:
      label: 问题模块
      description: 这个 Bug 出现在哪个功能模块？
      options:
        - 持仓管理
        - 分批管理
        - 收益分析
        - 做T计算器
        - 账户管理
        - 复盘管理
        - 新闻快讯
        - 数据导入/导出
        - 其他
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 项目版本
      description: 您使用的项目版本是什么？
      placeholder: 例如：1.0.0 或 commit hash
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: 浏览器
      description: 您使用的浏览器和版本
      placeholder: 例如：Chrome 122.0.6261.94
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统
      description: 您使用的操作系统
      placeholder: 例如：Windows 11 / macOS 14.3 / Ubuntu 22.04

  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单
      options:
        - label: 我已经搜索了现有的 Issues，确认这是一个新问题
          required: true
        - label: 我已经尝试清除浏览器缓存并重新加载页面
          required: false
        - label: 我愿意提交 PR 来修复这个问题
          required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 还有其他需要说明的内容吗？
      placeholder: 例如：这个问题是最近才出现的，之前版本正常
