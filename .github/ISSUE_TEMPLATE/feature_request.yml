name: 功能请求
description: 提出一个新功能或改进建议
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢您的建议！请详细描述您想要的功能。

  - type: textarea
    id: problem
    attributes:
      label: 问题背景
      description: 这个功能请求与什么问题相关？
      placeholder: |
        例如：我在复盘时经常需要对比不同时间段的收益，但目前只能查看单个时间点的数据
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 您希望如何解决这个问题？
      placeholder: |
        例如：希望增加收益走势图，支持选择时间范围查看历史收益变化
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 您考虑过哪些替代方案？
      placeholder: 例如：目前我通过手动导出数据到 Excel 进行分析

  - type: dropdown
    id: category
    attributes:
      label: 功能类别
      description: 这个功能属于哪个类别？
      options:
        - 数据可视化
        - 持仓管理
        - 收益分析
        - 复盘功能
        - 数据导入/导出
        - 用户界面
        - 性能优化
        - 其他
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级建议
      description: 您认为这个功能的重要程度
      options:
        - 低 - 锦上添花
        - 中 - 会提升使用体验
        - 高 - 对我的使用很重要
        - 紧急 - 没有这个功能很难使用
    validations:
      required: true

  - type: textarea
    id: mockup
    attributes:
      label: 设计稿或参考
      description: 如果有设计草图、原型或参考产品，请提供
      placeholder: |
        可以直接粘贴图片，或提供参考产品的链接

  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单
      options:
        - label: 我已经搜索了现有的 Issues 和 Discussions
          required: true
        - label: 这个功能符合项目的定位和范围
          required: false
        - label: 我愿意提交 PR 来实现这个功能
          required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 还有其他需要说明的内容吗？
